name: Testing

on:
  push:
    branches: [ v3 ]
    paths-ignore:
      - 'README*'
      - 'docs/**'
  pull_request:
    branches: [ v3 ]
    paths-ignore:
      - 'README*'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  testing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GO111MODULE: on
      NATS_NAMESPACE: test
      NATS_HOST: nats://127.0.0.1:4222
      NATS_TOKEN: s3cr3t

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start NATS cluster
        run: docker compose -f ".github/compose/docker-compose.yml" up -d

      - name: Wait for NATS cluster
        run: |
          for i in {1..30}; do
            if nc -z localhost 4222; then
              echo "NATS is ready"
              break
            fi
            echo "Waiting for NATS..."
            sleep 1
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Prepare test config
        run: |
          cat > config/values.yml <<'EOF'
          mode: debug
          namespace: test
          description: 测试收集器
          batch_size: 1000
          flush_interval: 5s
          nats_hosts:
            - nats://127.0.0.1:4222
            - nats://127.0.0.1:4223
            - nats://127.0.0.1:4224
          nats_token: s3cr3t
          mongo_url: mongodb://root:password@127.0.0.1:27017
          mongo_database: test
          EOF

      - name: Start collector service
        run: |
          go run . >/tmp/collector.log 2>&1 &
          echo $! > /tmp/collector.pid

      - name: Wait for collector
        run: |
          for i in {1..30}; do
            if grep -q "stream initialized" /tmp/collector.log; then
              echo "collector is ready"
              break
            fi
            echo "Waiting for collector..."
            sleep 1
          done

      - name: Run tests with coverage
        run: go test -race -covermode atomic -coverprofile=covprofile ./transfer/...

      - name: Stop collector service
        if: always()
        run: |
          if [ -f /tmp/collector.pid ]; then
            kill "$(cat /tmp/collector.pid)" || true
          fi

      - name: Upload coverage to Coveralls
        if: success() && github.event_name == 'push'
        run: |
          go install github.com/mattn/goveralls@latest
          goveralls -coverprofile=covprofile -service=github
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
